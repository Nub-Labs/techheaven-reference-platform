services:
  # ─── Application (nginx + php-fpm via supervisor) ────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: app
    container_name: techheaven_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./bagisto:/var/www/html                                     # Bagisto on host — editable
      - ./database/seeders:/var/www/html/database/seeders           # Our seeders
      - ./exports:/var/www/html/exports
    environment:
      APP_NAME: TechHeaven
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "${APP_URL:-http://localhost}"
      APP_ADMIN_URL: admin
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-techheaven}"
      DB_USERNAME: "${DB_USERNAME:-techheaven}"
      DB_PASSWORD: "${DB_PASSWORD:-techheaven_secret}"
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: "null"
      MAIL_FROM_ADDRESS: no-reply@techheaven.com
      MAIL_FROM_NAME: TechHeaven
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@techheaven.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Admin@12345}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - techheaven
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s   # seeding takes ~10 min on first run

  # ─── Queue Worker ─────────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    container_name: techheaven_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=3", "--max-time=3600", "--queue=default,emails,notifications"]
    volumes:
      - ./bagisto:/var/www/html
      - ./database/seeders:/var/www/html/database/seeders
    environment:
      APP_NAME: TechHeaven
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-techheaven}"
      DB_USERNAME: "${DB_USERNAME:-techheaven}"
      DB_PASSWORD: "${DB_PASSWORD:-techheaven_secret}"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - techheaven

  # ─── Scheduler (artisan schedule:run every minute) ────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker
    container_name: techheaven_scheduler
    restart: unless-stopped
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction >> /var/www/html/storage/logs/scheduler.log 2>&1;
        sleep 60;
      done"
    volumes:
      - ./bagisto:/var/www/html
      - ./database/seeders:/var/www/html/database/seeders
    environment:
      APP_NAME: TechHeaven
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-techheaven}"
      DB_USERNAME: "${DB_USERNAME:-techheaven}"
      DB_PASSWORD: "${DB_PASSWORD:-techheaven_secret}"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - techheaven

  # ─── MySQL ───────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: techheaven_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-techheaven}"
      MYSQL_USER: "${DB_USERNAME:-techheaven}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-techheaven_secret}"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/techheaven.cnf:ro
    ports:
      - "${MYSQL_EXTERNAL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - techheaven

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: techheaven_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_EXTERNAL_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - techheaven

  # ─── Mailpit (local email catcher) ───────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: techheaven_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - techheaven

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  techheaven:
    driver: bridge
